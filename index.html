<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Bot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-btn {
            background: #1e293b;
            color: #e5e7eb;
            border: 1px solid transparent;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .lang-btn:hover {
            background: #2563eb;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
            margin-bottom: 30px;
            font-size: 18px;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: #e5e7eb;
            background: #1e293b;
            padding: 14px 26px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: bold;
            border: 1px solid transparent;
            font-size: 16px;
            min-width: 140px;
        }

        .btn.primary {
            background: #2563eb;
        }

        .btn:hover {
            transform: translateY(-3px);
            border-color: #3b82f6;
            background: #2563eb;
            color: white;
        }

        .features {
            margin-top: 60px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .feature {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
            background: #273449;
        }

        .feature h3 {
            margin-bottom: 10px;
            color: #93c5fd;
            font-size: 20px;
        }

        .footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.6;
        }

        /* TABLET */
        @media (max-width: 900px) {
            h1 {
                font-size: 36px;
            }

            .features {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* MOBILE */
        @media (max-width: 600px) {

            .lang-switch {
                top: 10px;
                right: 10px;
            }

            .container {
                padding: 40px 15px;
            }

            h1 {
                font-size: 28px;
            }

            p {
                font-size: 16px;
            }

            .card {
                padding: 25px;
            }

            .buttons {
                flex-direction: column;
                gap: 15px;
            }

            .btn {
                width: 100%;
                font-size: 15px;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .feature {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="lang-switch">
    <button class="lang-btn" onclick="toggleLanguage()">PL / EN</button>
</div>

<div class="container">

    <div class="card">
        <h1 data-key="title"></h1>
        <p data-key="subtitle"></p>

        <div class="buttons">
            <a class="btn primary"
               data-key="invite"
               href="https://discord.com/oauth2/authorize?client_id=1181572279570800781&permissions=8&integration_type=0&scope=bot">
            </a>

            <a class="btn" data-key="tos" href="./tos.html"></a>
            <a class="btn" data-key="privacy" href="./privacy.html"></a>
        </div>
    </div>

    <div class="features">
        <div class="feature">
            <h3 data-key="f1-title"></h3>
            <p data-key="f1-text"></p>
        </div>

        <div class="feature">
            <h3 data-key="f2-title"></h3>
            <p data-key="f2-text"></p>
        </div>

        <div class="feature">
            <h3 data-key="f3-title"></h3>
            <p data-key="f3-text"></p>
        </div>

        <div class="feature">
            <h3 data-key="f4-title"></h3>
            <p data-key="f4-text"></p>
        </div>
    </div>

    <div class="footer" data-key="copyright"></div>

</div>

<script src="translations.js"></script>

</body>
</html>
