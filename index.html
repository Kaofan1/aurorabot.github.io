<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Bot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-btn {
            background: #1e293b;
            color: #e5e7eb;
            border: 1px solid transparent;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .lang-btn:hover {
            background: #2563eb;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 60px 20px;
            text-align: center;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            color: #e5e7eb;
            background: #1e293b;
            padding: 12px 22px;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: bold;
            border: 1px solid transparent;
        }

        .btn.primary {
            background: #2563eb;
        }

        .btn:hover {
            transform: translateY(-3px);
            border-color: #3b82f6;
            background: #2563eb;
            color: white;
        }

        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .feature {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
            background: #273449;
        }

        .feature h3 {
            margin-bottom: 10px;
            color: #93c5fd;
        }

        .footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="lang-switch">
    <button class="lang-btn" onclick="toggleLanguage()">🌍</button>
</div>

<div class="container">

    <div class="card">
        <h1 data-key="title">Aurora Bot</h1>
        <p data-key="subtitle">Powerful, modern Discord bot to enhance your server</p>

        <div class="buttons">
            <a class="btn primary"
               data-key="invite"
               href="https://discord.com/oauth2/authorize?client_id=1181572279570800781&permissions=8&integration_type=0&scope=bot">
               Invite Bot
            </a>

            <a class="btn" data-key="tos" href="./tos.html">Terms of Service</a>
            <a class="btn" data-key="privacy" href="./privacy.html">Privacy Policy</a>
        </div>
    </div>

    <div class="features">
        <div class="feature">
            <h3 data-key="f1-title">⚡ Fast Commands</h3>
            <p data-key="f1-text">Lightning-fast response time</p>
        </div>

        <div class="feature">
            <h3 data-key="f2-title">🛡️ Moderation</h3>
            <p data-key="f2-text">Keep your server safe</p>
        </div>

        <div class="feature">
            <h3 data-key="f3-title">🎵 Music</h3>
            <p data-key="f3-text">High-quality audio</p>
        </div>

        <div class="feature">
            <h3 data-key="f4-title">⚙️ Customization</h3>
            <p data-key="f4-text">Fully customizable</p>
        </div>
    </div>

    <div class="footer">
        © 2026 AuroraBot
    </div>

</div>

<script src="translations.js"></script>

</body>
</html>
