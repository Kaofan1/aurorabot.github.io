<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Bot – Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #1e293b;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .sidebar h2 {
            margin-top: 0;
            color: #93c5fd;
        }

        .nav-item {
            display: block;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            text-decoration: none;
            color: #e5e7eb;
            transition: 0.3s;
        }

        .nav-item:hover {
            background: #2563eb;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            margin-bottom: 15px;
            background: #0f172a;
            color: #e5e7eb;
        }

        .btn {
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #3b82f6;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
            }

            .main {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2 data-key="dashboard_title"></h2>

    <a class="nav-item" href="#" data-key="dashboard_general"></a>
    <a class="nav-item" href="#" data-key="dashboard_moderation"></a>
    <a class="nav-item" href="#" data-key="dashboard_logs"></a>
    <a class="nav-item" href="#" data-key="dashboard_modules"></a>
    <a class="nav-item" href="#" data-key="dashboard_integrations"></a>
</div>

<div class="main">

    <h1 data-key="dashboard_config"></h1>

    <div class="card">
        <h2 data-key="dashboard_general_settings"></h2>

        <label data-key="dashboard_prefix"></label>
        <input type="text" placeholder="! or /">

        <label data-key="dashboard_language"></label>
        <select>
            <option>English</option>
            <option>Polski</option>
        </select>

        <button class="btn" data-key="dashboard_save"></button>
    </div>

    <div class="card">
        <h2 data-key="dashboard_modules_title"></h2>

        <div class="toggle">
            <input type="checkbox" checked>
            <span>Moderation</span>
        </div>

        <div class="toggle">
            <input type="checkbox" checked>
            <span>Logging</span>
        </div>

        <div class="toggle">
            <input type="checkbox">
            <span>Auto Moderation</span>
        </div>

        <div class="toggle">
            <input type="checkbox">
            <span>Welcome Messages</span>
        </div>

        <button class="btn" data-key="dashboard_update_modules"></button>
    </div>

    <div class="card">
        <h2 data-key="dashboard_logs_title"></h2>

        <label data-key="dashboard_select_channel"></label>
        <select>
            <option>#general</option>
            <option>#logs</option>
            <option>#mod-logs</option>
        </select>

        <button class="btn" data-key="dashboard_save_channel"></button>
    </div>

</div>

<script src="translations.js"></script>

</body>
</html>
