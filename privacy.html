<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Bot – Privacy Policy</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
            margin: 0;
            padding: 0;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .lang-btn {
            background: #1e293b;
            color: #e5e7eb;
            border: 1px solid transparent;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .lang-btn:hover {
            background: #2563eb;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 60px 20px;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 40px;
            margin: 0;
        }

        h2 {
            margin-top: 35px;
            color: #93c5fd;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 5px;
        }

        p {
            line-height: 1.7;
            opacity: 0.9;
        }

        ul {
            line-height: 1.7;
            padding-left: 20px;
        }

        li {
            margin-bottom: 8px;
        }

        .btn {
            text-decoration: none;
            color: #e5e7eb;
            background: #1e293b;
            padding: 10px 16px;
            border-radius: 10px;
            transition: 0.3s;
            border: 1px solid transparent;
            font-size: 14px;
            white-space: nowrap;
        }

        .btn:hover {
            background: #2563eb;
            color: white;
            transform: translateY(-2px);
            border-color: #3b82f6;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.6;
            text-align: center;
        }

        .last-updated {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        /* TABLET */
        @media (max-width: 900px) {
            h1 {
                font-size: 32px;
            }

            .card {
                padding: 30px;
            }
        }

        /* MOBILE */
        @media (max-width: 600px) {

            .lang-switch {
                top: 10px;
                right: 10px;
            }

            .container {
                padding: 40px 15px;
            }

            h1 {
                font-size: 26px;
            }

            h2 {
                font-size: 18px;
            }

            .card {
                padding: 22px;
            }

            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .btn {
                width: 100%;
                text-align: center;
            }

            p, li {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="lang-switch">
    <button class="lang-btn" onclick="toggleLanguage()">PL / EN</button>
</div>

<div class="container">
    <div class="card">

        <div class="top-bar">
            <h1 data-key="privacy"></h1>
            <a class="btn" data-key="home" href="./index.html"></a>
        </div>

        <div class="last-updated" data-key="lastUpdated"></div>

        <h2 data-key="pp-1-title"></h2>
        <p data-key="pp-1-text1"></p>
        <p data-key="pp-1-text2"></p>

        <h2 data-key="pp-2-title"></h2>
        <p data-key="pp-2-text"></p>
        <ul>
            <li data-key="pp-2-li1"></li>
            <li data-key="pp-2-li2"></li>
            <li data-key="pp-2-li3"></li>
            <li data-key="pp-2-li4"></li>
        </ul>

        <p data-key="pp-2-text2"></p>

        <h2 data-key="pp-3-title"></h2>
        <ul>
            <li data-key="pp-3-li1"></li>
            <li data-key="pp-3-li2"></li>
            <li data-key="pp-3-li3"></li>
            <li data-key="pp-3-li4"></li>
        </ul>

        <h2 data-key="pp-4-title"></h2>
        <p data-key="pp-4-text"></p>

        <h2 data-key="pp-5-title"></h2>
        <p data-key="pp-5-text"></p>

        <h2 data-key="pp-6-title"></h2>
        <p data-key="pp-6-text"></p>

        <h2 data-key="pp-7-title"></h2>
        <p data-key="pp-7-text"></p>

        <h2 data-key="pp-8-title"></h2>
        <p data-key="pp-8-text"></p>

        <h2 data-key="pp-9-title"></h2>
        <p data-key="pp-9-text"></p>

        <h2 data-key="pp-10-title"></h2>
        <p data-key="pp-10-text"></p>

    </div>

    <div class="footer" data-key="copyright"></div>
</div>

<script src="translations.js"></script>

</body>
</html>
